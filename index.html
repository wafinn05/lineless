<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expovin — Transform your space</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #333333;
    }

    /* ---------- Full-page hero ---------- */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      background-image: url('cafe.png');
      background-size: cover;
      background-position: center;
    }

    /* thin black gradient from the top-right corner */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(0, 0, 0, .55) 0%, rgba(0, 0, 0, 0) 60%);
      pointer-events: none;
    }

    /* ---------- Navbar ---------- */
    .nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 26px 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 8px 18px;
      border-radius: 40px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .12);
    }

    .brand img {
      height: 34px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
      margin-left: -60px;
    }

    .nav-links a {
      color: rgba(255, 255, 255, .95);
      text-decoration: none;
      font-size: 14.5px;
      font-weight: 400;
      transition: opacity .2s;
    }

    .nav-links a:hover {
      opacity: .7;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .profile-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .12);
      transition: transform .2s;
    }

    .profile-btn:hover {
      transform: scale(1.05);
    }

    .profile-btn svg {
      width: 24px;
      height: 24px;
    }

    /* ---------- Hero heading ---------- */
    .headline {
      position: absolute;
      top: 44%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #fff;
      text-shadow: 0 4px 30px rgba(0, 0, 0, .25);
    }

    .headline .line1 {
      font-size: clamp(34px, 6.2vw, 62px);
      font-weight: 400;
      line-height: 1;
      letter-spacing: .5px;
    }

    .headline .line2 {
      font-size: clamp(48px, 9.5vw, 96px);
      font-weight: 700;
      line-height: .95;
      letter-spacing: .5px;
    }

    .cta-btn {
      margin-top: 54px;
      display: inline-block;
      text-decoration: none;
      background: #FFF3E6;
      color: #7A1E27;
      border: none;
      padding: 16px 40px;
      border-radius: 40px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
      transition: transform .2s, box-shadow .2s, background .2s;
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      background: #fff;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .3);
    }

    /* ---------- Left vertical time strip ---------- */
    .time-strip {
      position: absolute;
      left: 0;
      top: 34%;
      z-index: 5;
      background: #fff;
      border-radius: 0 16px 16px 0;
      padding: 22px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
    }

    .time-strip span {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: 13px;
      color: #333333;
      letter-spacing: 1px;
    }

    .time-strip .date {
      color: #9aa0aa;
      font-weight: 300;
      font-size: 12px;
    }

    /* ---------- Testimonial bubble ---------- */
    .testimonial {
      position: absolute;
      left: 11%;
      top: 40%;
      z-index: 5;
      max-width: 210px;
      background: #fff;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.5;
      color: #3a3f4a;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .16);
    }

    .testimonial::after {
      content: "";
      position: absolute;
      bottom: -8px;
      left: 30px;
      width: 18px;
      height: 18px;
      background: #fff;
      transform: rotate(45deg);
      border-radius: 3px;
    }

    /* ---------- Customers card (bottom left) ---------- */
    .customers {
      position: absolute;
      left: 8%;
      bottom: 12%;
      z-index: 5;
      background: #fff;
      border-radius: 18px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .18);
    }

    .avatars {
      display: flex;
    }

    .avatars .av {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      margin-left: -12px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .avatars .av:first-child {
      margin-left: 0;
    }

    .avatars .av svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .customers .txt .cnt {
      color: #7A1E27;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.2;
    }

    .customers .txt .more {
      color: #9aa0aa;
      font-size: 12px;
    }

    /* ---------- Info card (bottom right) ---------- */
    .info-card {
      position: absolute;
      right: 5%;
      bottom: 12%;
      z-index: 5;
      width: 250px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .18);
    }

    .info-card .thumb {
      width: 62px;
      height: 52px;
      border-radius: 10px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .info-card .thumb svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .info-card p {
      font-size: 11.5px;
      line-height: 1.45;
      color: #3a3f4a;
    }

    /* ---------- Scroll-down button ---------- */
    .scroll-btn {
      position: absolute;
      right: 5%;
      bottom: 6%;
      z-index: 6;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .92);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #1f2430;
      box-shadow: 0 8px 22px rgba(0, 0, 0, .2);
      transition: transform .2s;
    }

    .scroll-btn:hover {
      transform: translateY(3px);
    }

    /* ---------- Tablet (≤ 1024px) ---------- */
    @media (max-width: 1024px) {
      .nav-links {
        gap: 22px;
        margin-left: 0;
      }

      .nav {
        padding: 22px 24px;
      }

      .info-card {
        width: 210px;
        right: 4%;
        bottom: 8%;
      }

      .customers {
        left: 4%;
        bottom: 8%;
      }
    }

    /* ---------- Mobile (≤ 760px) ---------- */
    @media (max-width: 760px) {
      /* hide desktop-only nav + decorative floating bits */
      .nav-links,
      .time-strip {
        display: none;
      }

      .nav {
        padding: 16px 18px;
      }

      .brand {
        padding: 6px 14px;
      }

      .brand img {
        height: 22px;
      }

      .profile-btn {
        width: 40px;
        height: 40px;
      }

      /* headline: keep centered, add side breathing room, tighter scale */
      .headline {
        padding: 0 22px;
      }

      .headline .line1 {
        font-size: clamp(24px, 7vw, 34px);
      }

      .headline .line2 {
        font-size: clamp(38px, 11vw, 56px);
      }

      .cta-btn {
        margin-top: 26px;
        padding: 11px 26px;
        font-size: 14px;
      }

      /* stack the two info cards into a centered column at the bottom */
      .customers,
      .info-card {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 360px;
        justify-content: flex-start;
      }

      .customers {
        bottom: calc(16px + 88px);
      }

      .info-card {
        bottom: 16px;
      }

      .scroll-btn {
        display: none;
      }
    }

    /* ---------- Small phones (≤ 400px) ---------- */
    @media (max-width: 400px) {
      .headline .line2 {
        font-size: clamp(32px, 12vw, 44px);
      }

      .customers .av {
        width: 30px;
        height: 30px;
      }

      .info-card p {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <!-- Navbar -->
    <nav class="nav">
      <div class="brand">
        <img src="logo.png" alt="LineLess" />
      </div>
      <div class="nav-right">
        <button class="profile-btn" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1f2430" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20 C4 15.5 8 14 12 14 C16 14 20 15.5 20 20" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- Heading -->
    <div class="headline">
      <div class="line1">Skip the Line</div>
      <div class="line2">Save Your Time</div>
      <a href="pilih-restoran.html" class="cta-btn">Ambil Antrian</a>
    </div>

    <!-- Left time strip -->
    <div class="time-strip">
      <span>7:30 AM</span>
      <span class="date">Friday, Dec 29</span>
    </div>

    <!-- Customers card -->
    <div class="customers">
      <div class="avatars">
        <div class="av"><svg viewBox="0 0 40 40">
            <rect width="40" height="40" fill="#f0c8b4" />
            <circle cx="20" cy="16" r="8" fill="#5a3a2a" />
            <circle cx="20" cy="15" r="6.5" fill="#e8b89a" />
            <path d="M8 40 Q20 26 32 40 Z" fill="#c8543a" />
          </svg></div>
        <div class="av"><svg viewBox="0 0 40 40">
            <rect width="40" height="40" fill="#d8bce0" />
            <path d="M10 18 Q10 6 20 6 Q30 6 30 18 L30 26 Q30 30 20 30 Q10 30 10 26 Z" fill="#4a2a3a" />
            <circle cx="20" cy="17" r="6.5" fill="#e8c0a8" />
            <path d="M9 40 Q20 27 31 40 Z" fill="#7a5a8a" />
          </svg></div>
        <div class="av"><svg viewBox="0 0 40 40">
            <rect width="40" height="40" fill="#b4cce8" />
            <circle cx="20" cy="15" r="8" fill="#3a2a1a" />
            <circle cx="20" cy="16" r="6.5" fill="#d8a888" />
            <path d="M8 40 Q20 26 32 40 Z" fill="#2a4a6a" />
          </svg></div>
        <div class="av"><svg viewBox="0 0 40 40">
            <rect width="40" height="40" fill="#ecd8b0" />
            <circle cx="20" cy="15" r="8" fill="#8a6a3a" />
            <circle cx="20" cy="16" r="6.5" fill="#f0d0b0" />
            <path d="M8 40 Q20 26 32 40 Z" fill="#c8a048" />
          </svg></div>
        <div class="av"><svg viewBox="0 0 40 40">
            <rect width="40" height="40" fill="#bce8cc" />
            <circle cx="20" cy="15" r="8" fill="#4a3a2a" />
            <circle cx="20" cy="16" r="6.5" fill="#e0b898" />
            <path d="M8 40 Q20 26 32 40 Z" fill="#3a8a5a" />
          </svg></div>
      </div>
      <div class="txt">
        <div class="cnt">5 New Customer's</div>
        <div class="more">+23 More</div>
      </div>
    </div>

    <!-- Info card -->
    <div class="info-card">
      <div class="thumb">
        <svg viewBox="0 0 62 52" preserveAspectRatio="xMidYMid slice">
          <rect width="62" height="52" fill="#7A1E27" />
          <rect x="0" y="0" width="62" height="34" fill="#a12734" />
          <rect x="6" y="8" width="20" height="20" fill="#FFC857" />
          <path d="M30 20 Q30 12 40 12 Q50 12 50 20 L50 40 L30 40 Z" fill="#FFF3E6" />
          <ellipse cx="40" cy="18" rx="11" ry="8" fill="#FF6B6B" />
          <rect x="0" y="40" width="62" height="12" fill="#611620" />
        </svg>
      </div>
      <p>Get cost and information transparency in construction keep track of your spending</p>
    </div>

  </div>
</body>

</html>
